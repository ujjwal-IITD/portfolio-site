<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">
                    <span class="letter" style="--delay: 0s;">P</span>
                    <span class="letter" style="--delay: 0.05s;">O</span>
                    <span class="letter" style="--delay: 0.1s;">R</span>
                    <span class="letter" style="--delay: 0.15s;">T</span>
                    <span class="letter" style="--delay: 0.2s;">F</span>
                    <span class="letter" style="--delay: 0.25s;">O</span>
                    <span class="letter" style="--delay: 0.3s;">L</span>
                    <span class="letter" style="--delay: 0.35s;">I</span>
                    <span class="letter" style="--delay: 0.4s;">O</span>
                </span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About Me</a>
                <a href="education.html" class="nav-link">Education</a>
                <a href="experience.html" class="nav-link">Experience</a>
                <a href="publications.html" class="nav-link">Publications</a>
                <a href="conferences.html" class="nav-link">Conferences</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <h1 class="section-title">Get In Touch</h1>
            
            <div class="contact-content">
                <div class="contact-info">
                    <div class="contact-card contact-animate">
                        <div class="contact-icon">📧</div>
                        <h3>Email</h3>
                        <p><a href="mailto:ujjwal@example.com" class="contact-link">ujjwal@example.com</a></p>
                    </div>

                    <div class="contact-card contact-animate">
                        <div class="contact-icon">📍</div>
                        <h3>Location</h3>
                        <p>Delhi, India</p>
                    </div>
                </div>

                <form class="contact-form contact-form-animate">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" placeholder="Your message here..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary form-submit">
                        <span class="btn-text">Send Message</span>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Cursor -->
    <div class="custom-cursor"></div>
    <div class="cursor-follower"></div>

    <script src="script.js"></script>
</body>
</html>
